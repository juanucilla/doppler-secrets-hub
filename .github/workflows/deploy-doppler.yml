name: Deploy Doppler Server
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.EC2_REGION }}
      
      - name: Deploy Doppler to EC2
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          REGION: ${{ secrets.EC2_REGION }}
          DOPPLER_HMAC_SECRET: ${{ secrets.DOPPLER_HMAC_SECRET }}
        run: |
          # Send deployment command directly (inline, no temp files)
          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "sudo apt-get update",
              "sudo apt-get install -y python3 openssl curl",
              "sudo mkdir -p /opt/doppler_server /etc/doppler/pki /var/doppler",
              "aws secretsmanager get-secret-value --secret-id doppler/ca-cert --query SecretString --output text | sudo tee /etc/doppler/pki/ca.crt > /dev/null",
              "aws secretsmanager get-secret-value --secret-id doppler/server-cert --query SecretString --output text | sudo tee /etc/doppler/pki/server.crt > /dev/null",
              "aws secretsmanager get-secret-value --secret-id doppler/server-key --query SecretString --output text | sudo tee /etc/doppler/pki/server.key > /dev/null",
              "sudo chmod 600 /etc/doppler/pki/server.key",
              "cat > /tmp/server.py << '\''PYEOF'\''",
              "$(cat ./doppler/server.py)",
              "PYEOF",
              "sudo cp /tmp/server.py /opt/doppler_server/server.py",
              "sudo chmod 755 /opt/doppler_server/server.py",
              "echo \"DOPPLER_HMAC_SECRET=$DOPPLER_HMAC_SECRET\" | sudo tee /etc/default/doppler",
              "cat > /tmp/doppler.service << '\''SRVEOF'\''",
              "[Unit]",
              "Description=Doppler mTLS Server",
              "After=network.target",
              "[Service]",
              "Type=simple",
              "User=root",
              "EnvironmentFile=/etc/default/doppler",
              "ExecStart=/usr/bin/python3 /opt/doppler_server/server.py",
              "Restart=always",
              "[Install]",
              "WantedBy=multi-user.target",
              "SRVEOF",
              "sudo cp /tmp/doppler.service /etc/systemd/system/",
              "sudo systemctl daemon-reload",
              "sudo systemctl enable doppler",
              "sudo systemctl restart doppler",
              "sleep 3",
              "curl -s -k https://localhost:8443/health || echo \"Health check pending\""
            ]' \
            --region "$REGION" \
            --output json | jq '.Command.CommandId' -r > /tmp/cmd_id.txt
          
          CMD_ID=$(cat /tmp/cmd_id.txt)
          echo "Command sent: $CMD_ID"
          
          # Wait for completion (max 2 min)
          for i in {1..24}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --region "$REGION" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")
            
            echo "[$i/24] Status: $STATUS"
            
            if [ "$STATUS" = "Success" ]; then
              echo "✅ Deployment succeeded!"
              aws ssm get-command-invocation \
                --command-id "$CMD_ID" \
                --instance-id "$INSTANCE_ID" \
                --region "$REGION" \
                --query 'StandardOutputContent' \
                --output text | tail -20
              exit 0
            elif [ "$STATUS" = "Failed" ]; then
              echo "❌ Deployment failed!"
              aws ssm get-command-invocation \
                --command-id "$CMD_ID" \
                --instance-id "$INSTANCE_ID" \
                --region "$REGION" \
                --query 'StandardErrorContent' \
                --output text
              exit 1
            fi
            
            sleep 5
          done
          
          echo "⏱️  Command still running, check AWS console for details"
          exit 0

